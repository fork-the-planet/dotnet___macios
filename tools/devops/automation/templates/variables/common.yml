variables:
# provisionator-uri setting
- group: XamarinCompatLab

# allow to override the provisionator channel via a paramter
- name: PROVISIONATOR_CHANNEL
  value: ${{ parameters.provisionatorChannel }}

- group: xamops-azdev-secrets

# needed to install the dev certificates in the build machine
- group: Xamarin Notarization
- group: Xamarin Signing

# Override the GitHub.Token setting defined in the Xamarin Release group
# Use a token dedicated to critical production workflows and help avoid GitHub throttling
# this variable comes from the Xamarin-Secrets group, so we have do have both together
- group: Xamarin-Secrets
- name: GitHub.Token
  value: $(github--pat--vs-mobiletools-engineering-service2)  

# Overrude the azdo build access, as with the GitHub token, this variables depend on the
# Xamarin-Secrets group.
- name: AzDoBuildAccess.Token
  value: $(pat--xamarinc--build-access)

- name: AzDoBuildAccess.Token
  value: $(pat--xamarinc--build-access)

#  keying to use for the sining
- name: SigningKeychain
  value: "builder.keychain"

# Needed to ensure that devices uses the usb cable to communicate with the devices to run the tests.
- name: USE_TCP_TUNNEL                                        
  value: true

# pool information
- name: PRBuildPool
  value: 'VSEng-Xamarin-RedmondMacBuildPool-iOS-Untrusted'
- name: PRBuildPoolUrl
  value: 'https://devdiv.visualstudio.com/_settings/agentpools?poolId=366&view=agents'
- name: CIBuildPool
  value: 'VSEng-Xamarin-RedmondMacBuildPool-iOS-Trusted'
- name: CIBuildPoolUrl
  value: 'https://devdiv.visualstudio.com/_settings/agentpools?poolId=367&view=agents'

# ACES shared pool wiring.
#
# The infrastructure for routing build / api-diff / simulator-test jobs onto
# the ACES shared pool ($(CIBuildPoolACES), image $(CIBuildPoolACESImage))
# instead of the traditional Redmond Mac build pools ($(CIBuildPool) /
# $(PRBuildPool)) is plumbed through the `useACES` template parameter, which
# flows from each entry pipeline down through main-stage.yml /
# build-stage.yml, api-diff-stage.yml and tests/stage.yml. When `useACES` is
# true, those job-level templates emit:
#     pool:
#       name: $(CIBuildPoolACES)
#       demands: ImageOverride -equals $(CIBuildPoolACESImage)
# Otherwise they emit the original pool + Darwin / macOS.Name / XcodeChannel
# demands.
#
# The switch MUST be a literal in the entry pipeline. Azure Pipelines only
# resolves `${{ }}` expressions at template-expansion time, and variables
# brought in via `- template:` (like this file) are not visible at that
# point — they are runtime-only. So there is no working "single global
# variable" we can read here; the literal lives in each entry pipeline:
#
#   CI:
#     - build-pipeline.yml            -> useACES: true
#     - run-ci-api-diff.yml           -> useACES: true
#     - run-post-ci-build-tests.yml   -> useACES: true
#   PR:
#     - build-pull-request.yml        -> useACES: true
#     - run-pr-api-diff.yml           -> useACES: true
#     - run-post-pr-build-tests.yml   -> useACES: true
#
# Flip the literal in the three files on the side you want to move (e.g. when
# the ACES pool is unavailable, or when you need an Xcode/macOS beta that is
# only present on the traditional pools) and queue a new run.
- name: CIBuildPoolACES
  value: 'AcesShared'
- name: CIBuildPoolACESUrl
  value: 'https://dev.azure.com/devdiv/DevDiv/_settings/agentqueues?queueId=8259&view=jobs'
- name: CIBuildPoolACESImage
  value: 'ACES_VM_SharedPool_Tahoe'

# override the default build revision
- name: BUILD_REVISION
  value: azure-devops-$(Build.SourceVersion)

- name: MaciosUploadPrefix
  value: ''

# set the pipeline to debug mode or not
- name: system.debug
  value: false

# Tighten the needed network calls to comply with restrictions
# See https://devdiv.visualstudio.com/DevDiv/_git/Xamarin.yaml-templates/pullrequest/749941
- name: DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE
  value: 'true'
- name: DOTNET_SDK_VULNERABILITY_CHECK_DISABLE
  value: 'true'

# the name of our repository
- name: BUILD_REPOSITORY_TITLE
  value: ${{ split(variables['Build.Repository.Name'],'/')[1] }}

# point to the vsdrops that we will be using for the diff uploads.
- name: VSDropsPrefix
  value: 'https://vsdrop.corp.microsoft.com/file/v1/$(BUILD_REPOSITORY_TITLE)/device-tests'

- name: DotNetSdkVersion
  value: 10.0

- name: minimumMacOSVersion
  value: 15.6

- name: xcodeChannel
  value: Stable
